<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zaans Licht — Beheer</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --oranje: #FF6B00; --oranje-dark: #cc5500;
      --zwart: #0d0d0d; --grijs: #1a1a1a; --grijs-licht: #2a2a2a;
      --wit: #ffffff; --dim: #888; --groen: #22c55e; --rood: #ef4444;
    }
    body { background: var(--zwart); color: var(--wit); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* HEADER */
    .admin-header {
      background: var(--grijs);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      border-bottom: 2px solid var(--oranje);
      position: sticky; top: 0; z-index: 100;
      flex-wrap: wrap;
    }
    .admin-header h1 { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
    .admin-header h1 span { color: var(--oranje); }
    .header-btns { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }

    /* STATUS BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--grijs-licht); border-radius: 20px;
      padding: 0.3rem 0.8rem; font-size: 0.8rem; color: var(--dim);
      white-space: nowrap;
    }
    .badge.warn { color: #f59e0b; }
    .badge.ok   { color: var(--groen); }

    /* KNOPPEN */
    .btn {
      padding: 0.55rem 1.2rem; border: none; border-radius: 4px;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
      transition: background 0.2s, transform 0.15s, opacity 0.2s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-oranje  { background: var(--oranje); color: var(--wit); }
    .btn-oranje:hover:not(:disabled) { background: var(--oranje-dark); }
    .btn-groen   { background: #16a34a; color: var(--wit); }
    .btn-groen:hover:not(:disabled) { background: #15803d; }
    .btn-blauw   { background: #2563eb; color: var(--wit); }
    .btn-blauw:hover:not(:disabled) { background: #1d4ed8; }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid #333; padding: 0 2rem; }
    .tab { padding: 0.9rem 1.4rem; cursor: pointer; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); border-bottom: 3px solid transparent; margin-bottom: -1px; transition: color 0.2s; }
    .tab.active { color: var(--oranje); border-bottom-color: var(--oranje); }
    .tab:hover { color: var(--wit); }

    /* LOG PANEL */
    #log-panel {
      background: #0a0a0a; border-top: 1px solid #222;
      padding: 0.8rem 2rem; font-size: 0.8rem; color: var(--dim);
      font-family: monospace; min-height: 2.4rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    #log-panel.success { color: var(--groen); }
    #log-panel.error   { color: var(--rood); }
    #log-panel.loading { color: #f59e0b; }
    .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* CONTENT */
    .content { padding: 1.5rem 2rem; max-width: 1300px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* OFFLINE STATE */
    #offline-state { text-align: center; padding: 5rem 2rem; color: var(--dim); }
    #offline-state code { background: var(--grijs); padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.9rem; }

    /* SLIDER LIJST */
    .slider-lijst { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
    .slider-item { background: var(--grijs); border-radius: 6px; border: 1px solid #333; overflow: hidden; transition: border-color 0.2s; }
    .slider-item:hover { border-color: #444; }
    .slider-item.sortable-ghost { opacity: 0.25; }
    .slider-item.sortable-chosen { border-color: var(--oranje); }

    .slider-header { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1rem; cursor: pointer; user-select: none; }
    .drag-handle { color: var(--dim); font-size: 1.2rem; cursor: grab; padding: 0 0.2rem; }
    .drag-handle:active { cursor: grabbing; }
    .slider-naam { flex: 1; font-weight: 600; }
    .slider-count { color: var(--dim); font-size: 0.82rem; }
    .expand-btn { background: none; border: none; color: var(--dim); font-size: 0.9rem; cursor: pointer; padding: 0.2rem 0.5rem; transition: transform 0.2s, color 0.2s; }
    .expand-btn:hover { color: var(--oranje); }
    .slider-item.open .expand-btn { transform: rotate(180deg); color: var(--oranje); }

    /* FOTO GRID */
    .foto-grid { display: none; padding: 0.8rem 1rem 1rem; border-top: 1px solid #2a2a2a; flex-wrap: wrap; gap: 6px; }
    .slider-item.open .foto-grid { display: flex; }

    .foto-thumb { width: 110px; height: 74px; border-radius: 3px; overflow: hidden; cursor: grab; border: 2px solid transparent; transition: border-color 0.2s, transform 0.15s; position: relative; flex-shrink: 0; }
    .foto-thumb:hover { border-color: var(--oranje); }
    .foto-thumb:active { cursor: grabbing; }
    .foto-thumb.sortable-ghost { opacity: 0.25; }
    .foto-thumb.sortable-chosen { border-color: var(--oranje); transform: scale(1.06); }
    .foto-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
    .foto-nr { position: absolute; bottom: 0; left: 0; background: rgba(0,0,0,0.7); color: var(--wit); font-size: 0.6rem; padding: 1px 4px; }

    /* LEGE STAAT */
    .leeg { color: var(--dim); padding: 2rem; text-align: center; font-size: 0.9rem; }

    /* FOTO HOVER PREVIEW */
    #foto-preview {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      display: none;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 2px var(--oranje);
      transition: opacity 0.15s ease;
      opacity: 0;
      max-width: 380px;
    }
    #foto-preview.visible { opacity: 1; }
    #foto-preview img {
      display: block;
      width: 380px;
      max-height: 280px;
      object-fit: contain;
      background: #111;
    }
    #foto-preview .preview-naam {
      background: rgba(0,0,0,0.85);
      color: var(--dim);
      font-size: 0.7rem;
      padding: 4px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="admin-header">
  <h1>Zaans <span>Licht</span> — Beheer</h1>
  <div class="header-btns">
    <span class="badge" id="badge-convert">⏳ status laden...</span>
    <span class="badge" id="badge-sync">⏳ status laden...</span>
    <button class="btn btn-blauw"   id="btn-convert" onclick="doConvert()" disabled>🔄 Converteer JPG → WebP</button>
    <button class="btn btn-oranje"  id="btn-save"    onclick="doSave()"    disabled>💾 Manifest opslaan</button>
    <button class="btn btn-groen"   id="btn-sync"    onclick="doSync()"    disabled>🚀 Sync naar GitHub</button>
  </div>
</div>

<!-- LOG -->
<div id="log-panel">Verbinding maken met admin server...</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('voetbal')">⚽ Voetbal</div>
  <div class="tab" onclick="switchTab('nosports')">🌄 No Sports</div>
</div>

<!-- OFFLINE -->
<div id="offline-state" style="display:none">
  <p style="font-size:2.5rem">🔌</p>
  <p style="margin-top:1rem">Admin server draait niet.</p>
  <p style="margin-top:0.5rem">Start de server via <strong>Start Admin</strong> op het bureaublad,<br>of open een Terminal en typ:</p>
  <p style="margin-top:0.8rem"><code>python3 /Users/andreas/fotografie-site/admin-server.py</code></p>
</div>

<!-- FOTO HOVER PREVIEW -->
<div id="foto-preview">
  <img id="preview-img" src="" alt="" />
  <div class="preview-naam" id="preview-naam"></div>
</div>

<!-- CONTENT -->
<div class="content" id="main-content" style="display:none">
  <div id="tab-voetbal"  class="tab-panel active"><ul class="slider-lijst" id="lijst-voetbal"></ul></div>
  <div id="tab-nosports" class="tab-panel"><ul class="slider-lijst" id="lijst-nosports"></ul></div>
</div>

<script>
const API    = 'http://localhost:8765/api';
let manifest = null;
let activeTab = 'voetbal';
let dirty     = false;

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(API + '/manifest', { cache: 'no-store' });
    manifest  = await res.json();
    document.getElementById('offline-state').style.display  = 'none';
    document.getElementById('main-content').style.display   = 'block';
    document.getElementById('btn-save').disabled    = false;
    document.getElementById('btn-sync').disabled    = false;
    document.getElementById('btn-convert').disabled = false;
    setLog('✓ Verbonden — sleep om de volgorde aan te passen', 'success');
    renderAll();
    refreshStatus();
  } catch {
    document.getElementById('offline-state').style.display = 'block';
    document.getElementById('log-panel').textContent = '❌ Kan geen verbinding maken met admin server (localhost:8765)';
    document.getElementById('log-panel').className = 'error';
  }
}

// ── STATUS BADGES ──────────────────────────────────────────────────────────
async function refreshStatus() {
  try {
    const s = await fetch(API + '/status').then(r => r.json());
    const bc = document.getElementById('badge-convert');
    const bs = document.getElementById('badge-sync');
    bc.textContent  = s.unconverted > 0 ? `⚠ ${s.unconverted} JPG te converteren` : '✓ Alle foto\'s zijn WebP';
    bc.className    = 'badge ' + (s.unconverted > 0 ? 'warn' : 'ok');
    bs.textContent  = s.git_changes > 0 ? `⚠ ${s.git_changes} wijzigingen te pushen` : '✓ Gesynchroniseerd';
    bs.className    = 'badge ' + (s.git_changes > 0 ? 'warn' : 'ok');
  } catch {}
}

// ── MANIFEST OPHALEN UIT DOM ───────────────────────────────────────────────
function updateManifestFromDOM() {
  ['voetbal', 'nosports'].forEach(cat => {
    const lijst = document.getElementById('lijst-' + cat);
    manifest[cat] = Array.from(lijst.querySelectorAll('.slider-item')).map((el, i) => {
      const mapNaam = el.dataset.map;
      const base    = manifest[cat].find(x => x.map === mapNaam) || {};
      const fotos   = Array.from(el.querySelectorAll('.foto-thumb')).map(t => t.dataset.foto);
      return { ...base, volgorde: i, fotos };
    });
  });
}

// ── OPSLAAN ───────────────────────────────────────────────────────────────
async function doSave() {
  updateManifestFromDOM();
  setLog('<span class="spinner">⟳</span> Manifest opslaan...', 'loading');
  try {
    const r = await fetch(API + '/save-manifest', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(manifest)
    }).then(r => r.json());
    setLog('✓ ' + r.msg, 'success');
    dirty = false;
    refreshStatus();
  } catch (e) { setLog('❌ Fout: ' + e, 'error'); }
}

// ── SYNC ──────────────────────────────────────────────────────────────────
async function doSync() {
  await doSave();
  setLog('<span class="spinner">⟳</span> Pushen naar GitHub...', 'loading');
  setBtns(true);
  try {
    const r = await fetch(API + '/sync').then(r => r.json());
    setLog((r.success ? '✓ ' : '❌ ') + r.msg, r.success ? 'success' : 'error');
    refreshStatus();
  } catch (e) { setLog('❌ Server fout: ' + e, 'error'); }
  setBtns(false);
}

// ── CONVERTEREN ───────────────────────────────────────────────────────────
async function doConvert() {
  setLog('<span class="spinner">⟳</span> Foto\'s converteren naar WebP...', 'loading');
  setBtns(true);
  try {
    const r = await fetch(API + '/convert').then(r => r.json());
    setLog(`✓ ${r.converted} foto's geconverteerd naar WebP`, 'success');
    // Manifest herladen
    manifest = await fetch(API + '/manifest', { cache: 'no-store' }).then(r => r.json());
    renderAll();
    refreshStatus();
  } catch (e) { setLog('❌ Fout: ' + e, 'error'); }
  setBtns(false);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll() {
  renderCategorie('voetbal');
  renderCategorie('nosports');
  switchTab(activeTab);
}

function renderCategorie(cat) {
  const lijst = document.getElementById('lijst-' + cat);
  lijst.innerHTML = '';
  const items = (manifest[cat] || []).sort((a, b) => a.volgorde - b.volgorde);

  if (!items.length) {
    lijst.innerHTML = `<li class="leeg">Nog geen mappen in images/${cat}/</li>`;
    return;
  }

  items.forEach(item => {
    const li = document.createElement('li');
    li.className  = 'slider-item';
    li.dataset.map = item.map;

    const thumbs = item.fotos.map((f, i) => `
      <div class="foto-thumb" data-foto="${f}">
        <img src="images/${cat}/${encodeURIComponent(item.map)}/${encodeURIComponent(f)}" loading="lazy" />
        <span class="foto-nr">${i + 1}</span>
      </div>`).join('');

    li.innerHTML = `
      <div class="slider-header" onclick="toggleOpen(this)">
        <span class="drag-handle" title="Sleep om te sorteren">⠿</span>
        <span class="slider-naam">${item.naam}</span>
        <span class="slider-count">${item.fotos.length} foto's</span>
        <button class="expand-btn" title="Foto's tonen/verbergen">▼</button>
      </div>
      <div class="foto-grid">${thumbs}</div>`;

    lijst.appendChild(li);

    new Sortable(li.querySelector('.foto-grid'), {
      animation: 150, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
      onEnd() { hernum(li.querySelector('.foto-grid')); dirty = true; }
    });
  });

  new Sortable(lijst, {
    animation: 200, handle: '.drag-handle',
    ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen',
    onEnd() { dirty = true; }
  });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function toggleOpen(hdr) { hdr.closest('.slider-item').classList.toggle('open'); }
function hernum(grid) { grid.querySelectorAll('.foto-nr').forEach((el, i) => el.textContent = i + 1); }
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['voetbal','nosports'][i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}
function setLog(html, cls = '') {
  const el = document.getElementById('log-panel');
  el.innerHTML   = html;
  el.className   = cls;
}
function setBtns(disabled) {
  ['btn-save','btn-sync','btn-convert'].forEach(id => document.getElementById(id).disabled = disabled);
}

// ── FOTO HOVER PREVIEW ────────────────────────────────────────────────────
const preview     = document.getElementById('foto-preview');
const previewImg  = document.getElementById('preview-img');
const previewNaam = document.getElementById('preview-naam');
let previewTimer  = null;

document.addEventListener('mouseover', e => {
  const thumb = e.target.closest('.foto-thumb');
  if (!thumb) return;
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    const img  = thumb.querySelector('img');
    if (!img) return;
    previewImg.src       = img.src;
    previewNaam.textContent = thumb.dataset.foto || '';
    preview.style.display = 'block';
    positionPreview(e);
    requestAnimationFrame(() => preview.classList.add('visible'));
  }, 180);
});

document.addEventListener('mouseout', e => {
  const thumb = e.target.closest('.foto-thumb');
  if (!thumb) return;
  clearTimeout(previewTimer);
  preview.classList.remove('visible');
  setTimeout(() => { if (!preview.classList.contains('visible')) preview.style.display = 'none'; }, 160);
});

document.addEventListener('mousemove', e => {
  if (preview.style.display === 'block') positionPreview(e);
});

function positionPreview(e) {
  const pw = 380 + 4;
  const ph = 320;
  const margin = 16;
  let x = e.clientX + 20;
  let y = e.clientY - 20;
  if (x + pw > window.innerWidth  - margin) x = e.clientX - pw - 16;
  if (y + ph > window.innerHeight - margin) y = window.innerHeight - ph - margin;
  if (y < margin) y = margin;
  preview.style.left = x + 'px';
  preview.style.top  = y + 'px';
}

// Cmd+S / Ctrl+S opslaan
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); doSave(); }
});

// Waarschuwing bij sluiten met onopgeslagen wijzigingen
window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

init();
</script>
</body>
</html>
